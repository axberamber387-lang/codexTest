<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1 class="title">Snake</h1>
        <div class="meta">
          <div class="panel">Score: <strong data-score>0</strong></div>
          <div class="panel">Status: <strong data-status>Press Start game</strong></div>
          <label class="panel speed-control">
            Speed:
            <select data-speed>
              <option value="slow">Slow</option>
              <option value="normal" selected>Normal</option>
              <option value="fast">Fast</option>
            </select>
          </label>
          <label class="panel speed-control">
            Sound:
            <select data-sound>
              <option value="on" selected>On</option>
              <option value="off">Off</option>
            </select>
          </label>
        </div>
      </header>

      <section class="board-wrap">
        <section class="board" data-board aria-label="Snake board"></section>
        <div class="overlay" data-overlay>
          <div class="overlay-card">
            <h2 class="overlay-title">Start game</h2>
            <p class="note">Choose a speed, press Start game, then use arrow keys or WASD to steer.</p>
            <button class="restart" type="button" data-start>Start game</button>
          </div>
        </div>
      </section>

      <footer class="footer">
        <div class="controls" aria-label="On-screen controls">
          <span class="spacer" aria-hidden="true"></span>
          <button type="button" data-direction="up">Up</button>
          <span class="spacer" aria-hidden="true"></span>
          <button type="button" data-direction="left">Left</button>
          <button type="button" data-direction="down">Down</button>
          <button type="button" data-direction="right">Right</button>
        </div>

        <div class="panel">
          <button class="restart" type="button" data-restart>Restart</button>
          <p class="note">Start the game first, use arrow keys or WASD to steer, and press Space to pause or resume.</p>
        </div>
      </footer>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
